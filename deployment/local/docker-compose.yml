services:
  # ============================================================================
  # DATABASE: Neo4j Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:5.15.0-community
    platform: linux/amd64
    container_name: exam-neo4j
    ports:
      - "7475:7474" # HTTP (Neo4j Browser)
      - "7688:7687" # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-exam-secure-password-2024}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - exam_neo4j_data:/data
      - exam_neo4j_logs:/logs
    networks:
      - exam-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # VISUALIZATION: NeoDash - Interactive dashboards for Neo4j
  # ============================================================================
  neodash:
    image: neo4jlabs/neodash:2.4.11
    container_name: exam-neodash
    ports:
      - "5005:5005" # NeoDash web UI (you can change the host port if needed)
    environment:
      - NEO4J_URI=bolt://neo4j:7688
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-exam-secure-password-2024}
      # Optional: Pre-load a dashboard (create one in NeoDash and mount it)
      # - DASHBOARD_FILE=/dashboards/default.json
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - exam-network
    restart: unless-stopped

networks:
  exam-network:
    driver: bridge
    name: exam-network

volumes:
  exam_neo4j_data:
  exam_neo4j_logs:
