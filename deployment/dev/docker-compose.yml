services:
  # ============================================================================
  # DATABASE: Neo4j Graph Database
  # ============================================================================
  neo4j:
    image: neo4j:5.15.0-community
    platform: linux/amd64
    container_name: exam-neo4j
    ports:
      - "7474:7474" # HTTP (different port to avoid conflict with other Neo4j instances)
      - "7687:7687" # Bolt (different port to avoid conflict)
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-exam-secure-password-2024}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - exam_neo4j_data:/data
      - exam_neo4j_logs:/logs
    networks:
      - exam-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # BACKEND: FastAPI Application
  # ============================================================================
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: exam-backend
    ports:
      - "8000:8000"
    environment:
      # Application
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEBUG=${DEBUG:-false}
      # Neo4j (use container name as hostname)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-exam-secure-password-2024}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-5-nano
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.2}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3004}
      # LangSmith
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-graphrag-exam-evaluation}
      # Exam Settings
      - GRADE_LEVEL=${GRADE_LEVEL:-6}
      - PASSING_SCORE=${PASSING_SCORE:-50.0}
      - MAX_POINTS_PER_QUESTION=${MAX_POINTS_PER_QUESTION:-20}
      - SHOW_STEP_BY_STEP=${SHOW_STEP_BY_STEP:-true}
    volumes:
      - exam_uploads:/src/uploads
    networks:
      - exam-network
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================================
  # FRONTEND: Next.js Application
  # ============================================================================
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: exam-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Backend API URL (use container name as hostname)
      - NEXT_PUBLIC_API_URL=http://backend:8000
    networks:
      - exam-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  exam-network:
    driver: bridge
    name: exam-network

volumes:
  exam_neo4j_data:
  exam_neo4j_logs:
  exam_uploads:
